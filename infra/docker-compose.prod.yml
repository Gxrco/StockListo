version: "3.9"

# Production compose — builds all images from source.
# Usage:
#   cp .env.example .env   (then edit secrets)
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stocklisto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-stocklisto}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocklisto} -d ${POSTGRES_DB:-stocklisto}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [internal]

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stocklisto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stocklisto}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [internal]

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stocklisto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stocklisto}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker beat --loglevel=info -s /var/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stocklisto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stocklisto}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]

volumes:
  db_data:
  redis_data:

networks:
  internal:
    driver: bridge
