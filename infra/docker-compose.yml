version: "3.9"

x-api-env: &api-env
  env_file: .env.example

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stocklisto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocklisto}
      POSTGRES_DB: ${POSTGRES_DB:-stocklisto}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocklisto} -d ${POSTGRES_DB:-stocklisto}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stocklisto}:${POSTGRES_PASSWORD:-stocklisto}@db:5432/${POSTGRES_DB:-stocklisto}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stocklisto}:${POSTGRES_PASSWORD:-stocklisto}@db:5432/${POSTGRES_DB:-stocklisto}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.worker beat --loglevel=info -s /var/celerybeat-schedule
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stocklisto}:${POSTGRES_PASSWORD:-stocklisto}@db:5432/${POSTGRES_DB:-stocklisto}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
