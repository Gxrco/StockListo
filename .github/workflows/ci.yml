name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stocklisto
          POSTGRES_PASSWORD: stocklisto
          POSTGRES_DB: stocklisto_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app --ignore-missing-imports
      - run: pytest -x --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://stocklisto:stocklisto@localhost:5432/stocklisto_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          BOOTSTRAP_ADMIN_PASSWORD: Test1234!

  frontend:
    name: Frontend — typecheck, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --run
